name: CD - Cloudflare Turnstile (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true
        type: string
      turnstile_widget_name:
        description: Name of the Turnstile widget
        required: true
        type: string
        default: My Turnstile Widget
      turnstile_widget_domains:
        description: Domains as HCL list, e.g. ["example.com", "blog.example.com"]
        required: true
        type: string
        default: '["example.com", "blog.example.com"]'
      turnstile_widget_mode:
        description: Widget mode (managed, non-interactive, invisible)
        required: true
        type: string
        default: managed
      turnstile_widget_bot_fight_mode:
        description: Enable bot fight mode
        required: false
        type: boolean
        default: false
      turnstile_widget_clearance_level:
        description: Clearance level (no_clearance, jschallenge, managed, interactive)
        required: true
        type: string
        default: interactive
      turnstile_widget_ephemeral_id:
        description: Use ephemeral ID
        required: false
        type: boolean
        default: false
      turnstile_widget_offlabel:
        description: Enable offlabel use
        required: false
        type: boolean
        default: false
      turnstile_widget_region:
        description: Region (world, us, eu, apac)
        required: true
        type: string
        default: world

env:
  TF_VAR_cloudflare_api_key: ${{ secrets.CLOUDFLARE_API_KEY }}
  TF_VAR_cloudflare_api_email: ${{ secrets.CLOUDFLARE_API_EMAIL }}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="cloudflare_account_id=${{ github.event.inputs.cloudflare_account_id }}" \
            -var="turnstile_widget_name=${{ github.event.inputs.turnstile_widget_name }}" \
            -var="turnstile_widget_domains=${{ github.event.inputs.turnstile_widget_domains }}" \
            -var="turnstile_widget_mode=${{ github.event.inputs.turnstile_widget_mode }}" \
            -var="turnstile_widget_bot_fight_mode=${{ github.event.inputs.turnstile_widget_bot_fight_mode }}" \
            -var="turnstile_widget_clearance_level=${{ github.event.inputs.turnstile_widget_clearance_level }}" \
            -var="turnstile_widget_ephemeral_id=${{ github.event.inputs.turnstile_widget_ephemeral_id }}" \
            -var="turnstile_widget_offlabel=${{ github.event.inputs.turnstile_widget_offlabel }}" \
            -var="turnstile_widget_region=${{ github.event.inputs.turnstile_widget_region }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="cloudflare_account_id=${{ github.event.inputs.cloudflare_account_id }}" \
            -var="turnstile_widget_name=${{ github.event.inputs.turnstile_widget_name }}" \
            -var="turnstile_widget_domains=${{ github.event.inputs.turnstile_widget_domains }}" \
            -var="turnstile_widget_mode=${{ github.event.inputs.turnstile_widget_mode }}" \
            -var="turnstile_widget_bot_fight_mode=${{ github.event.inputs.turnstile_widget_bot_fight_mode }}" \
            -var="turnstile_widget_clearance_level=${{ github.event.inputs.turnstile_widget_clearance_level }}" \
            -var="turnstile_widget_ephemeral_id=${{ github.event.inputs.turnstile_widget_ephemeral_id }}" \
            -var="turnstile_widget_offlabel=${{ github.event.inputs.turnstile_widget_offlabel }}" \
            -var="turnstile_widget_region=${{ github.event.inputs.turnstile_widget_region }}"
